name: Ubuntu CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: true

      - name: Install system dependencies
        run: |
            sudo apt-get update
            sudo apt-get install -y \
              libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl1-mesa-dev \
              meson ninja-build cmake pkg-config python3-pip libwayland-dev libxkbcommon-dev

      - name: Setup Xmake
        uses: xmake-io/github-action-setup-xmake@v1

      - name: Cache xmake packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.xmake/packages
            ~/.xmake/cache
          key: ${{ runner.os }}-${{ runner.arch }}-xmake-${{ hashFiles('xmake.lua', 'xmake/*.lua') }}
          restore-keys: |
              ${{ runner.os }}-${{ runner.arch }}-xmake-
        
      - name: Cache FastNoise2 build
        id: cache-fastnoise2
        uses: actions/cache@v5
        with:
          path: thirdparty/FastNoise2/build
          key: fastnoise2-${{ runner.os }}-${{ hashFiles('thirdparty/FastNoise2/**') }}
          restore-keys: |
            fastnoise2-${{ runner.os }}-

      - name: Configure & Build|
        run: xmake f -p linux --toolchain=gcc -y -v

      - name: Install dependencies
        run: xmake require -y
      
      - name: Build FastNoise2 (if not cached)
        if: steps.cache-fastnoise2.outputs.cache-hit != 'true'
        run: xmake build FastNoise2

      - name: Build
        run: xmake build fractal