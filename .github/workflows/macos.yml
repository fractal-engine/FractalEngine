name: macOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x86_64, arm64]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Configure & Build
        run: |
          xmake f -p macosx --toolchain=clang -a ${{ matrix.arch }} -y -v --diagnosis
          xmake build engine
          xmake build fractal
          xmake build sample_game
          xmake build tests
          xmake build platform

      - name: Check shader binaries
        shell: bash
        run: |
          builddir="build/macosx/${{ matrix.arch }}/release"
          shaderdir="$builddir/assets/shaders/metal"
          echo "Checking shader binaries in $shaderdir"
          count=$(find "$shaderdir" -name '*.bin' | wc -l)
          if [ "$count" -eq 0 ]; then
            echo "::error ::No shader binaries found in $shaderdir"
            exit 1
          fi